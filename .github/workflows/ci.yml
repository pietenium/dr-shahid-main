# ─────────────────────────────────────────────────────────────────────────────
# CI Pipeline — Next.js (TypeScript)
#
# STRATEGY:
#   • Runs on every push to feature/fix/dev branches  →  catches issues early
#   • Runs on every PR targeting `main`               →  gate before merge
#   • NEVER triggers a deploy; only main branch does  →  hosting stays clean
#
# JOBS (in order):
#   1. lint          – ESLint + Prettier check
#   2. type-check    – tsc --noEmit (zero-tolerance for TS errors)
#   3. build         – next build (confirms the app actually compiles)
#   4. test          – Jest / Vitest unit & integration tests
#
# CACHING:
#   • node_modules   cached by package-lock.json hash  →  fast installs
#   • .next/cache    cached by source hash              →  faster builds
# ─────────────────────────────────────────────────────────────────────────────

name: ✅ CI

on:
  push:
    branches-ignore:
      - main # ← team pushes to feature branches; main is untouched
    branches:
      - main
      - personal/tarekul42
      - feat/*
      - fix/*
      - chore/*
      - refactor/*
  pull_request:
    branches:
      - main # ← every PR into main must pass CI before it can merge

# Cancel in-flight runs for the same branch when a new push arrives
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "20" # LTS — change to match your .nvmrc / .node-version
  NEXT_TELEMETRY_DISABLED: 1

jobs:
  # ── 1. LINT ──────────────────────────────────────────────────────────────────
  lint:
    name: 🔍 Lint & Format
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint
        # Tip: add  "lint": "eslint . --max-warnings 0"  in package.json
        #      so any warning is treated as an error in CI

      - name: Check Prettier formatting
        run: npm run format:check
        # Tip: add  "format:check": "prettier --check ."  in package.json

  # ── 2. TYPE CHECK ─────────────────────────────────────────────────────────
  type-check:
    name: 🔷 TypeScript Check
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run TypeScript compiler check
        run: npm run type-check
        # Tip: add  "type-check": "tsc --noEmit"  in package.json

  # ── 3. BUILD ──────────────────────────────────────────────────────────────
  build:
    name: 🏗️ Build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [lint, type-check] # only build if lint & types pass

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      # ── Next.js build cache (makes rebuilds 2-3× faster) ──
      - name: Restore Next.js build cache
        uses: actions/cache@v4
        with:
          path: .next/cache
          key: nextjs-${{ runner.os }}-${{ hashFiles('**/package-lock.json') }}-${{ hashFiles('**/*.ts', '**/*.tsx', '**/*.js', '**/*.jsx') }}
          restore-keys: |
            nextjs-${{ runner.os }}-${{ hashFiles('**/package-lock.json') }}-
            nextjs-${{ runner.os }}-

      - name: Build Next.js app
        run: npm run build
        env:
          # ── Add your non-secret public env vars here ──────────────────────
          # NEXT_PUBLIC_API_URL: ${{ vars.NEXT_PUBLIC_API_URL }}
          #
          # ── Secret env vars come from GitHub Secrets ──────────────────────
          # DATABASE_URL:        ${{ secrets.DATABASE_URL }}
          CI: true

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: nextjs-build-${{ github.sha }}
          path: .next/
          retention-days: 3 # keep for 3 days (enough for PR review)

  # ── 4. TEST ───────────────────────────────────────────────────────────────
  test:
    name: 🧪 Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [lint, type-check] # run in parallel with build

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run tests with coverage
        run: npm run test:ci
        # Tip: add  "test:ci": "jest --ci --coverage --forceExit"  in package.json
        #      or   "test:ci": "vitest run --coverage"

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always() # upload even if tests fail, for debugging
        with:
          name: coverage-${{ github.sha }}
          path: coverage/
          retention-days: 7

  # ── 5. CI SUMMARY (required status check) ─────────────────────────────────
  # Set THIS job as the required status check in GitHub branch protection.
  # It only passes when every job above passes — simple single checkbox.
  ci-success:
    name: ✅ CI Passed
    runs-on: ubuntu-latest
    needs: [lint, type-check, build, test]
    if: always()

    steps:
      - name: Check all jobs succeeded
        run: |
          if [[ "${{ needs.lint.result }}"       != "success" ||
                "${{ needs.type-check.result }}" != "success" ||
                "${{ needs.build.result }}"      != "success" ||
                "${{ needs.test.result }}"       != "success" ]]; then
            echo "❌ One or more CI jobs failed."
            exit 1
          fi
          echo "✅ All CI checks passed."
